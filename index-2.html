<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treffpunkt A1 – Digitale Übungen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rot: #E63950;
    --blau: #2E6FE6;
    --gruen: #3CB371;
    --gruen-dunkel: #2C8C57;
    --tinte: #1A1A2E;
    --creme: #FFF8F0;
    --gelb: #FFC93C;
    --weiss: #FFFFFF;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--creme);
    background-image:
      radial-gradient(circle at 15% 15%, rgba(255,201,60,0.25) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(46,111,230,0.12) 0%, transparent 45%),
      radial-gradient(circle at 80% 10%, rgba(230,57,80,0.10) 0%, transparent 40%);
    font-family: 'Nunito', sans-serif;
    color: var(--tinte);
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .wrap {
    width: 100%;
    max-width: 560px;
    padding: 36px 22px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 32px;
    margin: 0 0 8px;
    line-height: 1.15;
  }

  h1 .akzent { color: var(--blau); }

  header p {
    font-weight: 700;
    font-size: 15px;
    opacity: 0.65;
    margin: 0;
  }

  .liste {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .karte {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--weiss);
    border: 3px solid var(--tinte);
    border-radius: 20px;
    padding: 16px 18px;
    text-decoration: none;
    color: var(--tinte);
    box-shadow: 5px 5px 0 var(--tinte);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  .karte:active {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0 var(--tinte);
  }

  .icon {
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    border: 3px solid var(--tinte);
  }

  .icon.gruen { background: var(--gruen); }
  .icon.blau { background: var(--blau); }
  .icon.gelb { background: var(--gelb); }

  .karte-text { flex: 1; min-width: 0; }

  .karte-titel {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin: 0 0 2px;
  }

  .karte-info {
    font-size: 13px;
    font-weight: 700;
    opacity: 0.6;
    margin: 0;
  }

  .pfeil {
    font-size: 20px;
    opacity: 0.4;
    flex-shrink: 0;
  }

  .platzhalter {
    text-align: center;
    font-weight: 700;
    font-size: 14px;
    opacity: 0.45;
    padding: 20px;
    border: 3px dashed var(--tinte);
    border-radius: 20px;
    opacity: 0.4;
  }

  footer {
    text-align: center;
    margin-top: 36px;
    font-size: 12px;
    font-weight: 700;
    opacity: 0.4;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Treffpunkt <span class="akzent">A1</span><br>Digitale Übungen</h1>
    <p>Ergänzende Übungen zum Kursbuch – einfach antippen und los geht's.</p>
  </header>

  <div class="liste">

    <!--
      NEUE ÜBUNG HINZUFÜGEN:
      Einfach eine weitere .karte-Kachel nach diesem Muster ergänzen
      und den href auf den Dateinamen der neuen HTML-Datei setzen,
      die im selben Repository liegt.
    -->

    <a class="karte" href="artikel-quiz.html">
      <div class="icon gruen">🎯</div>
      <div class="karte-text">
        <p class="karte-titel">Artikel-Quiz</p>
        <p class="karte-info">der, die, das – schnell entscheiden</p>
      </div>
      <div class="pfeil">›</div>
    </a>

    <!-- Platzhalter für künftige Übungen. Beim Hinzufügen einfach
         löschen und durch weitere .karte-Einträge ersetzen. -->
    <div class="platzhalter">Weitere Übungen folgen hier</div>

  </div>

  <footer>Treffpunkt – Deutsch als Zweitsprache (Cornelsen) · Niveau A1</footer>

</div>
</body>
</html>
